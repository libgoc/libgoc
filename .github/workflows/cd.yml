name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vendor/**'
      - '.github/workflows/cd.yml'

jobs:
  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        id: create_tag
        run: |
          TAG=$(date -u +'%Y.%m.%d.%H.%M')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build (Linux)
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BDWGC_VERSION: "8.2.6"
      BDWGC_PREFIX: "${{ github.workspace }}/.local/bdwgc"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install apt dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libuv1-dev pkg-config build-essential \
            libatomic-ops-dev

      - name: Cache Boehm GC
        id: cache-bdwgc
        uses: actions/cache@v4
        with:
          path: ${{ env.BDWGC_PREFIX }}
          key: bdwgc-${{ env.BDWGC_VERSION }}-ubuntu-latest

      - name: Build or validate Boehm GC from source
        run: |
          if [ -f "${{ env.BDWGC_PREFIX }}/lib/libgc.a" ]; then
            echo "Cached Boehm GC static archive found; skipping rebuild."
            exit 0
          fi

          echo "Cached Boehm GC is invalid or missing libgc.a; building from source."
          rm -rf "${{ env.BDWGC_PREFIX }}"
          mkdir -p "${{ env.BDWGC_PREFIX }}"
          wget -q https://github.com/ivmai/bdwgc/releases/download/v${{ env.BDWGC_VERSION }}/gc-${{ env.BDWGC_VERSION }}.tar.gz
          tar xf gc-${{ env.BDWGC_VERSION }}.tar.gz
          cd gc-${{ env.BDWGC_VERSION }}
          ./configure --enable-threads=posix --enable-thread-local-alloc \
                      --disable-shared --enable-static --prefix=${{ env.BDWGC_PREFIX }}
          make -j$(nproc)
          make install
          if [ ! -f "${{ env.BDWGC_PREFIX }}/lib/libgc.a" ]; then
            echo "ERROR: Boehm GC install did not produce libgc.a"
            ls -l "${{ env.BDWGC_PREFIX }}/lib"
            exit 1
          fi
          cp ${{ env.BDWGC_PREFIX }}/lib/pkgconfig/bdw-gc.pc \
             ${{ env.BDWGC_PREFIX }}/lib/pkgconfig/bdw-gc-threaded.pc

      - name: Configure Boehm GC
        run: |
          echo "${{ env.BDWGC_PREFIX }}/lib" | sudo tee /etc/ld.so.conf.d/bdwgc.conf
          sudo ldconfig

      - name: Verify static dependencies
        run: |
          pkg-config --modversion libuv
          pkg-config --modversion bdw-gc-threaded
          PKG_CONFIG_ALL_STATIC=1 pkg-config --static --libs libuv
          PKG_CONFIG_ALL_STATIC=1 pkg-config --static --libs bdw-gc-threaded
        env:
          PKG_CONFIG_PATH: ${{ env.BDWGC_PREFIX }}/lib/pkgconfig

      - name: Build libgoc
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBGOC_STATIC_DEPENDENCIES=ON
          cmake --build build --target goc --parallel $(nproc)
        env:
          PKG_CONFIG_PATH: ${{ env.BDWGC_PREFIX }}/lib/pkgconfig
          PKG_CONFIG_ALL_STATIC: 1

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/libgoc.a dist/
          cp include/goc.h dist/
          cp include/goc_io.h dist/
          cp include/goc_array.h dist/
          cp include/goc_stats.h dist/
          cp include/goc_http.h dist/
          cd dist
          tar czf ../libgoc-${{ needs.tag.outputs.tag }}-canary-linux-x86_64.tar.gz libgoc.a goc.h goc_io.h goc_array.h goc_stats.h goc_http.h

      - uses: actions/upload-artifact@v4
        with:
          name: libgoc-${{ needs.tag.outputs.tag }}-canary-linux-x86_64
          path: libgoc-${{ needs.tag.outputs.tag }}-canary-linux-x86_64.tar.gz

  build-macos:
    name: Build (macOS)
    needs: tag
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Homebrew dependencies
        run: brew install cmake libuv bdw-gc pkg-config

      - name: Set up bdw-gc-threaded pkg-config alias
        run: |
          GLOBAL_PKGDIR="$(brew --prefix)/lib/pkgconfig"
          if [ ! -f "$GLOBAL_PKGDIR/bdw-gc-threaded.pc" ]; then
            cp "$GLOBAL_PKGDIR/bdw-gc.pc" "$GLOBAL_PKGDIR/bdw-gc-threaded.pc"
          fi

      - name: Verify static dependencies
        run: |
          pkg-config --modversion libuv
          pkg-config --modversion bdw-gc-threaded
          PKG_CONFIG_ALL_STATIC=1 pkg-config --static --libs libuv
          PKG_CONFIG_ALL_STATIC=1 pkg-config --static --libs bdw-gc-threaded

      - name: Build libgoc
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBGOC_STATIC_DEPENDENCIES=ON
          cmake --build build --target goc --parallel $(sysctl -n hw.ncpu)
        env:
          PKG_CONFIG_ALL_STATIC: 1

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/libgoc.a dist/
          cp include/goc.h dist/
          cp include/goc_io.h dist/
          cp include/goc_array.h dist/
          cp include/goc_stats.h dist/
          cp include/goc_http.h dist/
          cd dist
          tar czf ../libgoc-${{ needs.tag.outputs.tag }}-canary-macos-arm64.tar.gz libgoc.a goc.h goc_io.h goc_array.h goc_stats.h goc_http.h

      - uses: actions/upload-artifact@v4
        with:
          name: libgoc-${{ needs.tag.outputs.tag }}-canary-macos-arm64
          path: libgoc-${{ needs.tag.outputs.tag }}-canary-macos-arm64.tar.gz

  build-windows:
    name: Build (Windows)
    needs: tag
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-libuv
            mingw-w64-ucrt-x86_64-gc
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Set up bdw-gc-threaded pkg-config alias
        shell: msys2 {0}
        run: |
          PKGDIR="/ucrt64/lib/pkgconfig"
          if [ ! -f "$PKGDIR/bdw-gc-threaded.pc" ]; then
            cp "$PKGDIR/bdw-gc.pc" "$PKGDIR/bdw-gc-threaded.pc"
          fi

      - name: Verify static dependencies
        shell: msys2 {0}
        run: |
          pkg-config --static --libs libuv
          pkg-config --static --libs bdw-gc-threaded

      - name: Build libgoc
        shell: msys2 {0}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBGOC_STATIC_DEPENDENCIES=ON
          cmake --build build --target goc --parallel $(nproc)
        timeout-minutes: 10
        env:
          PKG_CONFIG_ALL_STATIC: 1

      - name: Package artifact
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/libgoc.a dist/
          cp include/goc.h dist/
          cp include/goc_io.h dist/
          cp include/goc_array.h dist/
          cp include/goc_stats.h dist/
          cp include/goc_http.h dist/
          cd dist
          tar czf ../libgoc-${{ needs.tag.outputs.tag }}-canary-windows-x86_64.tar.gz libgoc.a goc.h goc_io.h goc_array.h goc_stats.h goc_http.h

      - uses: actions/upload-artifact@v4
        with:
          name: libgoc-${{ needs.tag.outputs.tag }}-canary-windows-x86_64
          path: libgoc-${{ needs.tag.outputs.tag }}-canary-windows-x86_64.tar.gz

  release:
    name: Publish GitHub Release
    needs: [tag, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          files: |
            libgoc-${{ needs.tag.outputs.tag }}-canary-linux-x86_64.tar.gz
            libgoc-${{ needs.tag.outputs.tag }}-canary-macos-arm64.tar.gz
            libgoc-${{ needs.tag.outputs.tag }}-canary-windows-x86_64.tar.gz
