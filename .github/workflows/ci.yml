name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'vendor/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'vendor/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      BDWGC_VERSION: "8.2.6"
      BDWGC_PREFIX: "${{ github.workspace }}/.local/bdwgc"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Linux -------------------------------------------------------

      - name: Install apt dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libuv1-dev pkg-config build-essential \
            libatomic-ops-dev

      - name: Cache Boehm GC (Linux)
        if: runner.os == 'Linux'
        id: cache-bdwgc
        uses: actions/cache@v4
        with:
          path: ${{ env.BDWGC_PREFIX }}
          key: bdwgc-${{ env.BDWGC_VERSION }}-ubuntu-latest

      - name: Build Boehm GC from source (Linux)
        if: runner.os == 'Linux' && steps.cache-bdwgc.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/ivmai/bdwgc/releases/download/v${{ env.BDWGC_VERSION }}/gc-${{ env.BDWGC_VERSION }}.tar.gz
          tar xf gc-${{ env.BDWGC_VERSION }}.tar.gz
          cd gc-${{ env.BDWGC_VERSION }}
          ./configure --enable-threads=posix --enable-thread-local-alloc \
                      --enable-shared --prefix=${{ env.BDWGC_PREFIX }}
          make -j$(nproc)
          make install
          # Alias so pkg-config finds bdw-gc-threaded; baked into the cached
          # prefix so nothing needs to touch the cache dir after restore.
          cp ${{ env.BDWGC_PREFIX }}/lib/pkgconfig/bdw-gc.pc \
             ${{ env.BDWGC_PREFIX }}/lib/pkgconfig/bdw-gc-threaded.pc

      - name: Configure Boehm GC (Linux)
        if: runner.os == 'Linux'
        run: |
          # Register the library path so ldconfig picks it up.
          echo "${{ env.BDWGC_PREFIX }}/lib" | sudo tee /etc/ld.so.conf.d/bdwgc.conf
          sudo ldconfig

      - name: Verify dependencies (Linux)
        if: runner.os == 'Linux'
        env:
          PKG_CONFIG_PATH: ${{ env.BDWGC_PREFIX }}/lib/pkgconfig
        run: |
          pkg-config --modversion libuv
          pkg-config --modversion bdw-gc-threaded

      - name: Configure & Build (Linux)
        if: runner.os == 'Linux'
        run: |
          set -x
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel $(nproc)
        timeout-minutes: 2
        env:
          PKG_CONFIG_PATH: ${{ env.BDWGC_PREFIX }}/lib/pkgconfig

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure
        env:
          LD_LIBRARY_PATH: ${{ env.BDWGC_PREFIX }}/lib

      # ---- macOS -------------------------------------------------------

      - name: Install Homebrew dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libuv bdw-gc pkg-config

      - name: Verify dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pkg-config --modversion libuv
          pkg-config --modversion bdw-gc-threaded

      - name: Configure & Build (macOS)
        if: runner.os == 'macOS'
        run: |
          set -x
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel $(sysctl -n hw.ncpu)
        timeout-minutes: 5

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: ctest --test-dir build --output-on-failure

      # ---- Windows -----------------------------------------------------
      # Tests are skipped on Windows because the test harness uses POSIX-only
      # APIs (fork, waitpid, execinfo.h) that are not available on Windows.
      # The library build verifies that libgoc itself compiles on Windows.

      - name: Install pkg-config (Windows)
        if: runner.os == 'Windows'
        run: choco install pkgconfiglite --yes

      - name: Install vcpkg dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install libuv bdwgc --triplet x64-windows

      - name: Set up bdw-gc-threaded pkg-config alias (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkgdir = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig"
          if (Test-Path "$pkgdir\bdw-gc.pc") {
            Copy-Item "$pkgdir\bdw-gc.pc" "$pkgdir\bdw-gc-threaded.pc" -Force
          }

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig"
          cmake -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --target goc --config RelWithDebInfo
        timeout-minutes: 10
